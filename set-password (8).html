<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Your Password — YourLife CC</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080d14; --surface: #0e1620; --border: rgba(255,255,255,0.07);
    --accent: #3b82f6; --accent-glow: rgba(59,130,246,0.3);
    --green: #22c55e; --green-glow: rgba(34,197,94,0.25);
    --text: #f0f6ff; --muted: #6b7fa3; --red: #ef4444;
  }
  body {
    font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem 1rem;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% -10%, rgba(59,130,246,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 3rem 2.5rem; max-width: 460px; width: 100%;
    text-align: center; animation: fadeUp 0.6s ease both; position: relative; z-index: 1;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  .logo { display:flex; align-items:center; justify-content:center; gap:.5rem; margin-bottom:2rem; }
  .logo-icon { font-size:1.4rem; }
  .logo-text { font-size:.85rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
  h1 { font-size:1.6rem; font-weight:700; letter-spacing:-0.03em; margin-bottom:.5rem; }
  .subtitle { color:var(--muted); font-size:.9rem; line-height:1.6; margin-bottom:2rem; }
  .field { margin-bottom:1.25rem; text-align:left; }
  .field label { display:block; font-size:.78rem; font-weight:600; color:var(--muted); margin-bottom:.4rem; letter-spacing:.05em; text-transform:uppercase; }
  .field input {
    width:100%; padding:.85rem 1rem; background:rgba(255,255,255,0.04);
    border:1px solid var(--border); border-radius:10px; color:var(--text);
    font-family:'Sora',sans-serif; font-size:.95rem; outline:none; transition:border .2s;
  }
  .field input:focus { border-color:var(--accent); }
  .btn {
    width:100%; padding:1rem; background:var(--accent); color:#fff;
    border:none; border-radius:12px; font-family:'Sora',sans-serif;
    font-size:1rem; font-weight:700; cursor:pointer; transition:opacity .2s, transform .1s;
    margin-top:.5rem;
  }
  .btn:hover { opacity:.9; }
  .btn:active { transform:scale(.98); }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .msg { margin-top:1.25rem; padding:.875rem 1rem; border-radius:10px; font-size:.85rem; line-height:1.5; display:none; }
  .msg.error { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); color:#fca5a5; display:block; }
  .msg.success { background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.25); color:#86efac; display:block; }
  .strength { height:4px; border-radius:2px; margin-top:.5rem; background:rgba(255,255,255,.08); overflow:hidden; }
  .strength-bar { height:100%; border-radius:2px; transition:width .3s, background .3s; width:0%; }
  .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:.5rem; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🧠</span>
    <span class="logo-text">YourLife CC</span>
  </div>
  <h1>Set Your Password</h1>
  <p class="subtitle">Almost there! Create a password to complete your account setup.</p>

  <div class="field">
    <label>New Password</label>
    <input type="password" id="pass1" placeholder="Min. 8 characters" oninput="checkStrength(this.value)" />
    <div class="strength"><div class="strength-bar" id="strengthBar"></div></div>
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="pass2" placeholder="Repeat your password" />
  </div>

  <button class="btn" id="submitBtn" onclick="setPassword()">Activate My Account →</button>
  <div class="msg" id="msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://hrohgwcbfgywkpnvqxhk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhyb2hnd2NiZmd5d2twbnZxeGhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc1MDI2NTYsImV4cCI6MjA1MzA3ODY1Nn0.qDLBQSBTBqjkUMSXNTlNpVnBpSuPvRrBMFRHYdBzU-A';

const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Handle the token from the URL hash on page load
window.addEventListener('load', async () => {
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace('#', '?'));
  const errorCode = params.get('error_code');
  const errorDesc = params.get('error_description');

  if (errorCode === 'otp_expired') {
    showMsg('This activation link has expired. Please contact support at info@kingdom-creatives.com for a new link.', 'error');
    document.getElementById('submitBtn').disabled = true;
    return;
  }

  if (errorCode) {
    showMsg((errorDesc || 'Invalid link. Please contact support.').replace(/\+/g,' '), 'error');
    document.getElementById('submitBtn').disabled = true;
    return;
  }

  // Exchange the token for a session
  const accessToken = params.get('access_token');
  const refreshToken = params.get('refresh_token');
  const type = params.get('type');

  if (accessToken && refreshToken) {
    const { error } = await supa.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
    if (error) {
      showMsg('Session error: ' + error.message, 'error');
      document.getElementById('submitBtn').disabled = true;
    }
  } else {
    // Check if already logged in
    const { data: { session } } = await supa.auth.getSession();
    if (!session) {
      showMsg('No activation token found. Please use the link from your email.', 'error');
      document.getElementById('submitBtn').disabled = true;
    }
  }
});

function checkStrength(val) {
  const bar = document.getElementById('strengthBar');
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
  bar.style.width = (score * 25) + '%';
  bar.style.background = colors[score - 1] || 'transparent';
}

async function setPassword() {
  const p1 = document.getElementById('pass1').value;
  const p2 = document.getElementById('pass2').value;
  const btn = document.getElementById('submitBtn');

  if (!p1 || p1.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }
  if (p1 !== p2) { showMsg('Passwords do not match.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Setting up your account...';

  const { error } = await supa.auth.updateUser({ password: p1 });

  if (error) {
    showMsg('Error: ' + error.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Activate My Account →';
    return;
  }

  showMsg('✅ Password set! Logging you in...', 'success');
  setTimeout(() => { window.location.href = '/app/index.html'; }, 1500);
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}
</script>
</body>
</html>
