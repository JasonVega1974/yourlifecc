<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Welcome to The Well</title>
<link rel="canonical" href="https://yourlifecc.com/onboard.html">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/app/js/config.js"></script>

<style>
  :root{
    --bg:#050d1a;
    --card:rgba(255,255,255,.04);
    --border:rgba(245,200,66,.16);
    --gold:#f5c842;
    --tx:#f0f6ff;
    --tx2:rgba(240,246,255,.55);
    --tx3:rgba(240,246,255,.32);
    --fh:'Oswald',sans-serif;
    --fn:'Inter',sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    min-height:100%;
    background:var(--bg);
    color:var(--tx);
    font-family:var(--fn);
    -webkit-font-smoothing:antialiased;
  }

  /* ── BACKGROUND — night sky + gold blobs, matches the app ── */
  body::before{
    content:'';
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 70% 45% at 22% 12%, rgba(245,200,66,.09) 0%, transparent 60%),
      radial-gradient(ellipse 55% 40% at 82% 82%, rgba(245,200,66,.06) 0%, transparent 55%);
    pointer-events:none;
  }

  /* ── LAYOUT ── */
  #app{
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:2rem 1.1rem 3rem;
  }
  .screen{
    width:100%; max-width:480px;
    opacity:0; animation:fadeUp .5s .08s forwards;
  }

  /* ── PROGRESS DOTS (screens 2+3 only) ── */
  #dots{
    display:flex; justify-content:center; gap:.5rem;
    margin-bottom:1.8rem;
  }
  #dots span{
    width:7px; height:7px; border-radius:50%;
    background:var(--tx3);
    transition:background .2s;
  }
  #dots span.on{ background:var(--gold); }

  /* ── SCREEN 1 — WELCOME ── */
  #screen1{ text-align:center; }
  .s1-cross{ font-size:2.6rem; margin-bottom:1rem; }
  .s1-mark{
    font-family:var(--fh); font-weight:700;
    font-size:2.1rem; letter-spacing:.12em;
    color:var(--gold); margin-bottom:1rem;
  }
  .s1-sub{
    font-size:.98rem; color:var(--tx2);
    line-height:1.6; margin-bottom:.9rem;
    padding:0 .5rem;
  }
  .s1-note{
    font-size:.82rem; color:var(--tx3);
    font-style:italic; margin-bottom:2.2rem;
  }

  /* ── SCREEN 2 header ── */
  .screen-title{
    font-family:var(--fh); font-weight:600;
    font-size:1.5rem; letter-spacing:.01em;
    color:var(--tx); margin-bottom:.5rem;
    text-align:center;
  }
  .screen-sub{
    font-size:.86rem; color:var(--tx2);
    line-height:1.55; text-align:center;
    margin-bottom:1.7rem;
  }

  /* ── OPTION CARDS (screen 2) ── */
  .opt-card{
    display:flex; align-items:center; gap:.9rem;
    width:100%; min-height:80px;
    background:var(--card);
    border:1.5px solid rgba(255,255,255,.1);
    border-radius:16px;
    padding:1rem 1.1rem;
    margin-bottom:.75rem;
    cursor:pointer; text-align:left;
    transition:border-color .18s, background .18s, transform .12s;
    color:var(--tx);
    font-family:inherit;
  }
  .opt-card:hover{ border-color:rgba(245,200,66,.4); }
  .opt-card:active{ transform:scale(.99); }
  .opt-card.selected{
    border-color:var(--gold);
    background:rgba(245,200,66,.08);
  }
  .opt-icon{ font-size:1.6rem; flex-shrink:0; }
  .opt-label{ font-size:.98rem; font-weight:700; margin-bottom:.15rem; }
  .opt-sub{ font-size:.78rem; color:var(--tx2); line-height:1.4; }

  /* ── SCREEN 3 — recommendation card ── */
  .rec-card{
    background:var(--card);
    border:1.5px solid rgba(245,200,66,.3);
    border-radius:20px;
    padding:2rem 1.6rem;
    text-align:center;
    margin-bottom:1.1rem;
  }
  .rec-icon{ font-size:2.6rem; margin-bottom:.8rem; }
  .rec-title{
    font-family:var(--fh); font-weight:600;
    font-size:1.35rem; color:var(--tx);
    margin-bottom:.5rem; line-height:1.25;
  }
  .rec-sub{
    font-size:.86rem; color:var(--tx2);
    line-height:1.6; margin-bottom:1.5rem;
  }

  /* ── PRIMARY BUTTON ── */
  .btn-primary{
    width:100%; height:52px;
    background:var(--gold);
    border:none; border-radius:16px;
    color:#1a1000; font-family:var(--fh);
    font-size:.96rem; font-weight:600;
    letter-spacing:.02em;
    cursor:pointer;
    transition:opacity .2s, transform .15s;
  }
  .btn-primary:hover{ opacity:.92; transform:translateY(-1px); }
  .btn-primary:active{ transform:translateY(0); }
  .btn-primary:disabled{ opacity:.35; cursor:not-allowed; transform:none; }

  /* ── SECONDARY LINK (screen 3, below the rec card) ── */
  .explore-link{
    display:block; text-align:center;
    font-size:.82rem; color:var(--tx3);
    margin-top:1.1rem; text-decoration:none;
    cursor:pointer; background:none; border:none;
    font-family:inherit;
  }
  .explore-link:hover{ color:var(--tx2); }

  /* ── BACK LINK (subtle, screen 2 only) ── */
  .back-link{
    display:inline-flex; align-items:center; gap:.3rem;
    font-size:.75rem; color:var(--tx3);
    cursor:pointer; margin-bottom:1rem;
    background:none; border:none;
    transition:color .15s;
  }
  .back-link:hover{ color:var(--tx2); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(16px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .screen.slide-out{ animation:slideOut .22s forwards; }
  @keyframes slideOut{ to{ opacity:0; transform:translateY(-10px); } }

  @media (prefers-reduced-motion: reduce){
    .screen{ animation:none; opacity:1; }
    .screen.slide-out{ animation:none; }
    .btn-primary:hover{ transform:none; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ══ SCREEN 1 — WELCOME TO THE WELL ══ -->
  <div class="screen" id="screen1">
    <div class="s1-cross">✝️</div>
    <div class="s1-mark">THE WELL</div>
    <div class="s1-sub">A place to explore faith, pray, and discover who Jesus is.</div>
    <div class="s1-note">You don't need to have it all figured out.</div>
    <button class="btn-primary" onclick="goTo(2)">Enter →</button>
  </div>

  <!-- ══ SCREEN 2 — WHERE ARE YOU RIGHT NOW? ══ -->
  <div class="screen" id="screen2" style="display:none;">
    <div id="dots2" class="dots-row"></div>
    <button class="back-link" onclick="goTo(1)">← Back</button>
    <div class="screen-title">Where are you right now?</div>
    <div class="screen-sub">No wrong answer — this just helps us show you the right thing first.</div>

    <button type="button" class="opt-card" data-stage="curious" onclick="selectStage(this,'curious')">
      <span class="opt-icon">🔍</span>
      <span>
        <div class="opt-label">Just curious</div>
        <div class="opt-sub">I'm exploring. No commitment yet.</div>
      </span>
    </button>
    <button type="button" class="opt-card" data-stage="believer" onclick="selectStage(this,'believer')">
      <span class="opt-icon">🙏</span>
      <span>
        <div class="opt-label">I believe — I want to grow</div>
        <div class="opt-sub">I'm in. Show me what's next.</div>
      </span>
    </button>
    <button type="button" class="opt-card" data-stage="questions" onclick="selectStage(this,'questions')">
      <span class="opt-icon">💬</span>
      <span>
        <div class="opt-label">I have questions</div>
        <div class="opt-sub">I'm not sure what I think yet.</div>
      </span>
    </button>

    <button class="btn-primary" id="s2Btn" onclick="goTo(3)" disabled style="margin-top:.5rem;">Continue →</button>
  </div>

  <!-- ══ SCREEN 3 — YOUR FIRST MOMENT ══ -->
  <div class="screen" id="screen3" style="display:none;">
    <div id="dots3" class="dots-row"></div>
    <div class="rec-card">
      <div class="rec-icon" id="s3Icon"></div>
      <div class="rec-title" id="s3Title"></div>
      <div class="rec-sub" id="s3Sub"></div>
      <button class="btn-primary" id="s3Btn" onclick="finishOnboarding()"></button>
    </div>
    <button type="button" class="explore-link" onclick="finishOnboarding()">Explore everything →</button>
  </div>

</div><!-- /app -->

<script>
// ── STATE ──────────────────────────────────────────────────
const STATE = {
  faithStage: '',   // 'curious' | 'believer' | 'questions'
  userId: null,
};

let _currentScreen = 1;

// ── PROGRESS DOTS ──────────────────────────────────────────
function dotsHtml(active){
  var h = '';
  for(var i=1;i<=3;i++){ h += '<span class="' + (i===active ? 'on' : '') + '"></span>'; }
  return h;
}
function renderDots(active){
  var wrap = 'dots' + (active===2 ? '2' : '3');
  var el = document.getElementById(wrap);
  if(el) el.innerHTML = dotsHtml(active);
}

// ── NAVIGATION ─────────────────────────────────────────────
function goTo(step){
  var cur = document.getElementById('screen' + _currentScreen);
  var next = document.getElementById('screen' + step);
  if(!next) return;

  if(step === 3) populateScreen3();

  if(cur){
    cur.classList.add('slide-out');
    setTimeout(function(){ cur.style.display = 'none'; cur.classList.remove('slide-out'); }, 200);
  }
  setTimeout(function(){
    next.style.display = 'block';
    next.style.opacity = '0';
    next.style.animation = 'fadeUp .45s forwards';
    if(step >= 2) renderDots(step);
    _currentScreen = step;
    window.scrollTo(0,0);
  }, cur ? 180 : 0);
}

// ── SCREEN 2: SINGLE-SELECT ────────────────────────────────
function selectStage(el, stage){
  document.querySelectorAll('.opt-card').forEach(function(c){ c.classList.remove('selected'); });
  el.classList.add('selected');
  STATE.faithStage = stage;
  document.getElementById('s2Btn').disabled = false;
}

// ── SCREEN 3: RECOMMENDATION PER STAGE ─────────────────────
var STAGE_REC = {
  curious: {
    icon: '🔭',
    title: "Start with Today's Mystery",
    sub: "A question that pulls you in — no church background needed.",
    btn: "Open Today's Mystery →"
  },
  believer: {
    icon: '👣',
    title: "Begin My Walk with God",
    sub: "A 14-step discipleship pathway — start wherever you are.",
    btn: "Take the first step →"
  },
  questions: {
    icon: '⚖️',
    title: "See the Evidence",
    sub: "100 historical, philosophical, and scientific arguments. Honest questions deserve real answers.",
    btn: "Explore the evidence →"
  }
};
function populateScreen3(){
  var rec = STAGE_REC[STATE.faithStage] || STAGE_REC.curious;
  document.getElementById('s3Icon').textContent  = rec.icon;
  document.getElementById('s3Title').textContent = rec.title;
  document.getElementById('s3Sub').textContent   = rec.sub;
  document.getElementById('s3Btn').textContent   = rec.btn;
}

// ── ENTER KEY SUPPORT ──────────────────────────────────────
document.addEventListener('keydown', function(e){
  if(e.key !== 'Enter') return;
  if(_currentScreen === 1) goTo(2);
  else if(_currentScreen === 2 && !document.getElementById('s2Btn').disabled) goTo(3);
});

// ── FINISH: set faith_free + onboarding_complete, enter the app ──
// NOTE: deep-linking straight into the recommended feature (Today's
// Mystery / My Walk / Proof & Prophecy) was scoped out — reaching those
// destinations reliably on a cold app load needs showSection('s-scripture')
// + a short setTimeout before fzOpenDest()/bfTab(), mirroring the existing
// wellGoto() pattern in app/js/faith.js. Both the recommended-action button
// and "Explore everything" currently do the same thing (route to The Well
// home) — this is the hook point for that follow-up, not a bug.
async function finishOnboarding(){
  var btn = document.getElementById('s3Btn');
  if(btn) btn.disabled = true;

  try {
    var userId = STATE.userId || (typeof localStorage !== 'undefined' ? localStorage.getItem('ylcc_onboard_uid') : null);
    var supa = (typeof getSupabase === 'function') ? getSupabase() : null;
    if(supa && userId){
      var sessRes = await supa.auth.getSession();
      var email = sessRes && sessRes.data && sessRes.data.session && sessRes.data.session.user && sessRes.data.session.user.email;
      // Mirrors set-password.html:296-307 (the existing client-side faith_free
      // write) — plan_status is the real tier column. faith_only is added here
      // too (matching api/faith-register.js's server-side path) since that pair
      // is what the Stripe-webhook guard checks before skipping a sync; see
      // docs/F0-followups.md for the incident this protects against.
      await supa.from('profiles').upsert({
        user_id: userId,
        email: email || '',
        plan_status: 'faith_free',
        faith_only: true,
        updated_at: new Date().toISOString()
      }, { onConflict: 'user_id' });
    }
  } catch(e){ console.warn('[onboard] faith_free write failed (non-blocking):', e); }

  try {
    // onboard.html is standalone (no sync.js/data.js loaded), so this writes
    // directly into the same localStorage blob the app reads on boot —
    // mirrors the prior saveOnboardData() pattern. onboarding_complete must
    // exist in DEF (app/js/data.js) for loadData() to restore it.
    var APP_LS_KEY = 'lifeos_v2';
    var existing = {};
    try { var raw = localStorage.getItem(APP_LS_KEY); if(raw) existing = JSON.parse(raw) || {}; } catch(e){}
    var merged = Object.assign({}, existing, { onboarding_complete: true });
    localStorage.setItem(APP_LS_KEY, JSON.stringify(merged));
  } catch(e){ console.warn('[onboard] local save failed:', e); }

  enterApp();
}

// ── ENTER APP ──────────────────────────────────────────────
function enterApp(){
  window.location.href = '/app';
}

// ── SESSION CHECK ──────────────────────────────────────────
// This page assumes an authenticated caller (routed here from
// authComplete() in app/js/auth.js after a fresh signup). If there's no
// live session, there's nothing to onboard — send them back to sign in
// rather than showing a wizard with nothing to attach it to.
(function(){
  try {
    var supa = (typeof getSupabase === 'function') ? getSupabase() : null;
    if(!supa){ return; } // no client available — fail open, let the wizard run
    supa.auth.getSession().then(function(res){
      var session = res && res.data && res.data.session;
      if(session && session.user){
        STATE.userId = session.user.id;
      } else if(!localStorage.getItem('ylcc_onboard_uid')){
        // No live session AND no stashed uid from the redirect — nothing to
        // onboard. Send back to the app, which will show the sign-in screen.
        window.location.href = '/app';
      }
    }).catch(function(){ /* non-blocking — let the wizard run */ });
  } catch(e){ /* non-blocking */ }
})();
</script>
</body>
</html>
