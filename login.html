<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Life OS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#060a12;--bg2:#0c1220;--c1:#38bdf8;--tx:#f0f6ff;--tx2:#8fa3bf;--tx3:#4a6080;--border:rgba(255,255,255,.07);--card:rgba(255,255,255,.04);--err:#f87171;--ok:#34d399;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
a{color:var(--c1);text-decoration:none;}
a:hover{text-decoration:underline;}
.top-bar{padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.logo{font-family:'Syne',sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:2px;color:var(--c1);}
.logo span{color:var(--tx2);font-weight:400;}
.center{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
.box{width:100%;max-width:400px;}
.form-title{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:900;margin-bottom:.3rem;}
.form-sub{color:var(--tx2);font-size:.85rem;margin-bottom:2rem;font-weight:300;}
.field{margin-bottom:1rem;}
label{display:block;font-size:.73rem;font-weight:600;color:var(--tx2);margin-bottom:.3rem;letter-spacing:.3px;}
input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:.65rem .9rem;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
input:focus{border-color:rgba(56,189,248,.45);}
input::placeholder{color:var(--tx3);}
.btn{width:100%;padding:.7rem;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:all .2s;border:none;background:var(--c1);color:#06101e;}
.btn:hover{background:#7dd3fc;}
.btn:disabled{background:var(--tx3);cursor:not-allowed;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--tx);margin-top:.5rem;}
.btn-ghost:hover{border-color:rgba(255,255,255,.2);}
.err-msg{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:.6rem .9rem;font-size:.8rem;color:var(--err);margin-bottom:1rem;display:none;}
.ok-msg{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.18);border-radius:8px;padding:.6rem .9rem;font-size:.8rem;color:var(--ok);margin-bottom:1rem;display:none;}
.divider{display:flex;align-items:center;gap:.7rem;margin:1rem 0;color:var(--tx3);font-size:.75rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(6,16,30,.3);border-top-color:#06101e;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
#resetForm{display:none;}
</style>
</head>
<body>
<div class="top-bar">
  <a href="index.html" class="logo">LIFE<span> OS</span></a>
  <div style="font-size:.82rem;color:var(--tx2);">No account? <a href="register.html">Create one free</a></div>
</div>
<div class="center">
  <div class="box">

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="form-title">Welcome back</div>
      <div class="form-sub">Sign in to access your family's Life OS.</div>
      <div id="errMsg" class="err-msg"></div>
      <div id="okMsg" class="ok-msg"></div>
      <div class="field">
        <label>EMAIL ADDRESS</label>
        <input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" id="loginPass" placeholder="Your password" autocomplete="current-password" onkeyup="if(event.key==='Enter')doLogin()">
      </div>
      <div style="text-align:right;font-size:.75rem;margin-bottom:1rem;"><a href="#" onclick="showReset()">Forgot password?</a></div>
      <button class="btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
      <div class="divider">or</div>
      <button class="btn btn-ghost" onclick="location.href='register.html'">Create Free Account</button>
      <div style="margin-top:1.5rem;font-size:.75rem;color:var(--tx3);text-align:center;">
        If you registered but haven't confirmed your email yet, check your inbox.
      </div>
    </div>

    <!-- RESET FORM -->
    <div id="resetForm">
      <div class="form-title">Reset password</div>
      <div class="form-sub">We'll send a reset link to your email.</div>
      <div id="resetErr" class="err-msg"></div>
      <div id="resetOk" class="ok-msg"></div>
      <div class="field">
        <label>EMAIL ADDRESS</label>
        <input type="email" id="resetEmail" placeholder="you@email.com">
      </div>
      <button class="btn" id="resetBtn" onclick="doReset()">Send Reset Link</button>
      <button class="btn btn-ghost" onclick="showLogin()">← Back to Sign In</button>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://hrohgwcbfgywkpnvqxhk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhyb2hnd2NiZmd5d2twbnZxeGhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MjcxNDYsImV4cCI6MjA4ODQwMzE0Nn0.PuWtBpiMw2DiCLp26ZP_Rd9BwzFvWT0sNZrDUNdULyo';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showErr(id,msg){ const e=document.getElementById(id); e.textContent=msg; e.style.display='block'; }
function showOk(id,msg){ const e=document.getElementById(id); e.textContent=msg; e.style.display='block'; }
function hideMsg(ids){ ids.forEach(id=>{ document.getElementById(id).style.display='none'; }); }
function showReset(){ document.getElementById('loginForm').style.display='none'; document.getElementById('resetForm').style.display='block'; }
function showLogin(){ document.getElementById('resetForm').style.display='none'; document.getElementById('loginForm').style.display='block'; }

async function doLogin(){
  hideMsg(['errMsg','okMsg']);
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if(!email||!pass){ showErr('errMsg','Please fill in all fields.'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Signing in...';

  const {data, error} = await supabase.auth.signInWithPassword({email, password:pass});
  if(error){
    showErr('errMsg', error.message==='Invalid login credentials'?'Incorrect email or password.':error.message);
    btn.disabled=false; btn.innerHTML='Sign In →'; return;
  }

  // Get family record
  const {data:family, error:famErr} = await supabase.from('families').select('id,plan,plan_status').eq('user_id', data.user.id).single();
  if(famErr||!family){
    showErr('errMsg','Account found but no family record. Please contact support.');
    btn.disabled=false; btn.innerHTML='Sign In →'; return;
  }

  // Check subscription status
  if(family.plan_status==='cancelled'||family.plan_status==='past_due'){
    showErr('errMsg','Your subscription is inactive. Please update your billing in account settings.');
    btn.disabled=false; btn.innerHTML='Sign In →'; return;
  }

  // Redirect to app
  location.href = `app?id=${family.id}`;
}

async function doReset(){
  hideMsg(['resetErr','resetOk']);
  const email=document.getElementById('resetEmail').value.trim();
  if(!email){ showErr('resetErr','Please enter your email.'); return; }
  const btn=document.getElementById('resetBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Sending...';
  const {error}=await supabase.auth.resetPasswordForEmail(email,{redirectTo:location.origin+'/reset-password.html'});
  btn.disabled=false; btn.innerHTML='Send Reset Link';
  if(error){ showErr('resetErr',error.message); return; }
  showOk('resetOk','Reset link sent! Check your email inbox.');
}

// Auto-redirect if already logged in
supabase.auth.getSession().then(async ({data:{session}})=>{
  if(session){
    const {data:family}=await supabase.from('families').select('id').eq('user_id',session.user.id).single();
    if(family) location.href=`app?id=${family.id}`;
  }
});
</script>
</body>
</html>
