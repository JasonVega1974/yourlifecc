<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Activating...</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background:#0a0e1a; color:#e2e8f0; font-family:sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:1rem; }
    .msg { text-align:center; max-width:420px; }
    .msg p { color:#64748b; font-size:.9rem; margin-top:.5rem; line-height:1.55; }
    .btn { display:inline-block; margin-top:1.2rem; padding:.7rem 1.4rem; background:linear-gradient(135deg,#38bdf8,#7c3aed); color:#fff; border:none; border-radius:10px; font-weight:700; font-size:.92rem; cursor:pointer; font-family:inherit; }
    .btn:disabled { opacity:.55; cursor:default; }
    .btn.secondary { background:transparent; border:1px solid rgba(255,255,255,.15); color:#cbd5e1; margin-left:.5rem; }
    .field { margin-top:1rem; text-align:left; }
    .field input { width:100%; box-sizing:border-box; padding:.7rem .9rem; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:10px; color:#fff; font-size:.92rem; font-family:inherit; outline:none; }
    .small { font-size:.78rem; color:#64748b; margin-top:.6rem; }
    .ok { color:#22c55e; }
    .err { color:#f87171; }
  </style>
</head>
<body>
<!-- ── SPINNER STATE (default) ── -->
<div class="msg" id="loadingState">
  <div style="font-size:2rem;margin-bottom:.5rem;">⟳</div>
  <div style="font-size:1rem;font-weight:600;">Activating your account...</div>
  <p>Please wait, do not close this tab.</p>
</div>

<!-- ── ERROR / EXPIRED STATE ── -->
<div class="msg" id="errorState" style="display:none;">
  <div style="font-size:2.4rem;margin-bottom:.5rem;">⏱️</div>
  <div style="font-size:1.05rem;font-weight:700;color:#fff;">Activation link expired or invalid</div>
  <p id="errorDetail">This link has expired or has already been used. Enter your email below and we'll send a fresh activation link.</p>
  <div class="field">
    <input type="email" id="resendEmail" placeholder="your email" autocomplete="email">
  </div>
  <div>
    <button class="btn" id="resendBtn" onclick="resendActivation()">Resend activation email</button>
    <a href="https://yourlifecc.com" class="btn secondary" style="text-decoration:none;display:inline-block;line-height:1.3;">Home</a>
  </div>
  <div class="small" id="resendStatus"></div>
  <p class="small">Need help? Email <a href="mailto:info@kingdom-creatives.com" style="color:#38bdf8;">info@kingdom-creatives.com</a></p>
</div>

<script>
  const SUPABASE_URL = 'https://hrohgwcbfgywkpnvqxhk.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhyb2hnd2NiZmd5d2twbnZxeGhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MjcxNDYsImV4cCI6MjA4ODQwMzE0Nn0.PuWtBpiMw2DiCLp26ZP_Rd9BwzFvWT0sNZrDUNdULyo';

  const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { detectSessionInUrl: true, persistSession: true }
  });

  function parseHash(){
    const h = (window.location.hash || '').replace(/^#/, '');
    const params = {};
    h.split('&').forEach(kv=>{
      if(!kv) return;
      const [k,v] = kv.split('=');
      params[decodeURIComponent(k||'')] = decodeURIComponent((v||'').replace(/\+/g,' '));
    });
    return params;
  }

  function showError(detail){
    document.getElementById('loadingState').style.display = 'none';
    const errEl = document.getElementById('errorState');
    errEl.style.display = 'block';
    if(detail){ document.getElementById('errorDetail').textContent = detail; }
    // Pre-fill email if we can read it from a recent signup attempt
    try{
      const last = localStorage.getItem('ylcc_last_signup_email');
      if(last) document.getElementById('resendEmail').value = last;
    }catch(e){}
  }

  async function resendActivation(){
    const emailEl = document.getElementById('resendEmail');
    const statusEl = document.getElementById('resendStatus');
    const btn = document.getElementById('resendBtn');
    const email = (emailEl.value || '').trim();
    statusEl.className = 'small';
    statusEl.textContent = '';
    if(!email || !email.includes('@')){
      statusEl.className = 'small err';
      statusEl.textContent = 'Please enter a valid email address.';
      return;
    }
    btn.disabled = true; btn.textContent = 'Sending…';
    try{
      const { error } = await supa.auth.resend({
        type: 'signup',
        email,
        options: { emailRedirectTo: 'https://yourlifecc.com/activate.html' }
      });
      if(error){
        statusEl.className = 'small err';
        statusEl.textContent = error.message || 'Could not send. Try again or contact support.';
      } else {
        statusEl.className = 'small ok';
        statusEl.textContent = 'Sent! Check your inbox (and spam) for the new activation link.';
        try{ localStorage.setItem('ylcc_last_signup_email', email); }catch(e){}
      }
    } catch(e){
      statusEl.className = 'small err';
      statusEl.textContent = 'Network error. Try again.';
    }
    btn.disabled = false; btn.textContent = 'Resend activation email';
  }

  async function activate() {
    // 1. If the hash carries an error from Supabase, show the error UI and stop.
    const hashParams = parseHash();
    if(hashParams.error || hashParams.error_code){
      const detail = hashParams.error_description
        || (hashParams.error_code === 'otp_expired'
              ? 'This activation link has expired or has already been used. Enter your email below and we\'ll send a fresh link.'
              : 'This activation link is no longer valid. Enter your email below to receive a new one.');
      showError(detail);
      return;
    }

    // 2. Happy path — listen for Supabase to consume the token and route to set-password.
    supa.auth.onAuthStateChange((event, session) => {
      if ((event === 'SIGNED_IN' || event === 'USER_UPDATED') && session) {
        window.location.href = '/set-password.html?activated=1';
      }
    });

    // 3. Poll session as a fallback.
    let attempts = 0;
    const poll = setInterval(async () => {
      attempts++;
      const { data: { session } } = await supa.auth.getSession();
      if (session) {
        clearInterval(poll);
        window.location.href = '/set-password.html?activated=1';
        return;
      }
      // After 8 seconds with no session and no error param, fall through to the error UI
      // so the user always sees an actionable next step instead of an indefinite spinner.
      if (attempts >= 8){
        clearInterval(poll);
        showError('We couldn\'t complete activation automatically. The link may have expired. Enter your email below for a fresh link.');
      }
    }, 1000);
  }

  activate();
</script>
</body>
</html>
