<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Activating...</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<script>
  // This page receives the Supabase magic link click.
  // Supabase JS will auto-consume the hash token and establish a session.
  // We then redirect to set-password.html with the session already active.

  const SUPABASE_URL = 'https://hrohgwcbfgywkpnvqxhk.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhyb2hnd2NiZmd5d2twbnZxeGhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MjcxNDYsImV4cCI6MjA4ODQwMzE0Nn0.PuWtBpiMw2DiCLp26ZP_Rd9BwzFvWT0sNZrDUNdULyo';

  const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { detectSessionInUrl: true }
  });

  async function activate() {
    // Check for error in hash first
    const hash = window.location.hash;
    if (hash.includes('error_code=otp_expired') || hash.includes('error=')) {
      window.location.href = '/set-password.html?error=expired';
      return;
    }

    // Wait for Supabase to consume the hash token and fire auth event
    supa.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    setTimeout(() => {
      window.location.href = '/set-password.html?activated=1';
    }, 1000);
  }
});

    // Also check if session is already there (fast path)
    await new Promise(r => setTimeout(r, 600));
    const { data: { session } } = await supa.auth.getSession();
    if (session) {
      setTimeout(() => {
        window.location.href = '/set-password.html?activated=1';
      }, 1000);
      return;
    }

    // If we get here with no session, something went wrong
    const params = new URLSearchParams(hash.replace('#', ''));
    if (!params.get('access_token')) {
      window.location.href = '/set-password.html?error=notoken';
    }
  }

  activate();
</script>
</body>
</html>
